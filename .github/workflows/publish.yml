name: Publish to PyPI

# Publishes on a GitHub Release. Uses PyPI Trusted Publishing (OIDC) — configure
# a trusted publisher for this repo at https://pypi.org/manage/account/publishing/
# (no API token needed). Until that's set up, this workflow is inert.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
